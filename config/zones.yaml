device:
  id: oak4d-exitclear-01
  mode: development
  privacy_mode_default: true

zones:
  - id: exit_path_main
    label: Main Exit Path
    type: emergency_exit
    required_clear_width_mm: 500
    monitored_height_mm: 500
    monitored_depth_mm: 1000
    persistence_threshold_s: 3.0
    transient_person_grace_s: 2.5
    occupancy:
      depth_delta_mm: 120
      min_occupied_pct_watch: 5
      min_occupied_pct_violation: 15
      smoothing_frames: 7
      min_component_area_mm2: 50000.0
      lateral_bins: 24

outputs:
  event_log_path: data/events.jsonl
  emit_json: true
  preview_enabled: true
  preview_fps: 8
