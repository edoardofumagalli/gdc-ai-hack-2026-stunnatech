device:
  id: oak4d-exitclear-minimal-01

sign_detection:
  model_path: yolo.rvc4.tar.xz
  target_label: emergency

monitoring:
  zone_id: exit_clearance_volume

  volume_mm:
    width_mm: 1000
    height_below_anchor_mm: 1000
    depth_before_anchor_mm: 1000

  depth_delta_mm: 150
  occupancy_threshold_pct: 15.0
  persistence_threshold_s: 3.0
  baseline_frames: 30
  smoothing_frames: 5

output:
  print_status: true
  write_events_jsonl: true
  events_path: events.jsonl
  live_view: true
  show_occupied_mask: true
