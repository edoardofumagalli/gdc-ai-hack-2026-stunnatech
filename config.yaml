device:
  id: oak4d-exitclear-minimal-01

sign_detection:
  model_path: yolo.rvc4.tar.xz
  target_label: emergency

monitoring:
  zone_id: exit_clearance_volume

  volume_mm:
    width_mm: 1000
    height_below_anchor_mm: 2400
    depth_before_anchor_mm: 1000

  depth_delta_mm: 150
  occupancy_threshold_pct: 7.0
  persistence_threshold_s: 3.0
  baseline_frames: 30
  smoothing_frames: 5

output:
  events_path: events.jsonl
  show_occupied_mask: true

dashboard:
  room:
    name: Aula 4
    device_id: OAK-4D
    capacity: 100

earthquake:
  enabled: true
  sample_rate_hz: 400
  batch_threshold: 20
  threshold_mps2: 0.98
  min_duration_s: 0.05

people_counter:
  enabled: true
  model_name: luxonis/dm-count:shb-426x240
  tensor_name: density_map
  raw_scale: 242.0
  smoothing_frames: 5

audio:
  enabled: true
  output_dir: generated_audio
  alarm_path: assets/alarm.mp3
  repeat_count: 3
  pause_ms: 650
  voice_id: JBFqnCBsd6RMkjVDRZzb
  model_id: eleven_multilingual_v2
  output_format: mp3_44100_128

  voice_settings:
    stability: 0.35
    similarity_boost: 0.8
    style: 0.6
    speed: 1.05
    use_speaker_boost: true

  messages:
    earthquake: "Attention. {event} detected. Evacuate immediately from {exit_name}."
